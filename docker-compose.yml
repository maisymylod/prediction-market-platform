services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pmp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmp}
      POSTGRES_DB: ${POSTGRES_DB:-pmp}
    ports:
      # Host 5433 to avoid clashing with a local Postgres on 5432.
      - "5433:5432"
    volumes:
      - pmp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmp} -d ${POSTGRES_DB:-pmp}"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Applies migrations then seeds, once, against a healthy db. Exits 0.
  migrate:
    build: { context: ., dockerfile: Dockerfile }
    command: sh -c "pnpm db:migrate && pnpm db:seed"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pmp}:${POSTGRES_PASSWORD:-pmp}@db:5432/${POSTGRES_DB:-pmp}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  worker:
    build: { context: ., dockerfile: Dockerfile }
    command: pnpm --filter worker start
    # Runs keyless on the simulator by default. Add USE_KALSHI_LIVE / secrets here
    # (or via an env_file) to enable live venue ingestion.
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pmp}:${POSTGRES_PASSWORD:-pmp}@db:5432/${POSTGRES_DB:-pmp}
      USE_PRICE_SIMULATOR: "true"
    depends_on:
      db: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

  web:
    build: { context: ., dockerfile: Dockerfile }
    command: pnpm --filter web start
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pmp}:${POSTGRES_PASSWORD:-pmp}@db:5432/${POSTGRES_DB:-pmp}
      WEB_PORT: "3000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      db: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

volumes:
  pmp_pgdata:
